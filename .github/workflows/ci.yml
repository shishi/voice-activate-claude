name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Install Nix
        uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342  # v31.11.0
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569  # v7.0.2
        with:
          primary-key: nix-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-
          gc-max-store-size-linux: 4G

      - name: Build devShell dependencies
        run: nix build .#devShells.x86_64-linux.default.inputDerivation --no-link

      - name: Cache venv
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: .venv
          # venv は interpreter の実パスを抱えるため、flake.lock(Python 更新)でも無効化する
          key: venv-${{ hashFiles('uv.lock', 'flake.lock') }}

      - name: Install
        run: nix develop -c uv sync --locked

      - name: Test
        run: nix develop -c uv run pytest
